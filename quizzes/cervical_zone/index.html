var QS=[

  /* ── КОСТИ И СУСТАВЫ ── */
  {cat:'bones',
   q:'Чем атлант (C1) анатомически отличается от всех остальных шейных позвонков?',
   correct:'Не имеет тела и остистого отростка — представляет собой костное кольцо из двух дуг с двумя латеральными массами',
   wrong:['Имеет самое большое тело среди всех позвонков','Имеет раздвоенный остистый отросток как C3–C6','Не имеет поперечных отростков и суставных фасеток'],
   exp:'Атлант эволюционно «пожертвовал» телом в пользу осевого позвонка — зубовидный отросток C2 (dens axis) является бывшим телом атланта, приросшим к C2. Это объясняет уникальную кинематику атланто-осевого сустава. При массаже C1 не пальпируется сзади как остистый — ищут его поперечные отростки между сосцевидным отростком и углом нижней челюсти.'},

  {cat:'bones',
   q:'Какое движение обеспечивает атланто-осевой сустав (C1–C2) и сколько % от общей ротации шеи?',
   correct:'Ротация головы — около 50% от всей ротации шейного отдела',

   exp:'Атланто-осевой — преимущественно ротационный сустав: голова вращается вокруг зубовидного отростка C2, удерживаемого поперечной связкой атланта. Именно поэтому нижняя косая мышца головы (C1→C2) — главный ротатор на этом уровне. Атланто-затылочный сустав (C0–C1) отвечает за кивание (~50% сгибания/разгибания головы).'},

  {cat:'bones',
   q:'Унковертебральные суставы (суставы Люшка) — что это такое?',
   correct:'Псевдосуставы между крючковидными отростками тел шейных позвонков C3–C7; при артрозе сужают межпозвонковые отверстия → шейная радикулопатия',

   exp:'Унковертебральные суставы формируются к 10 годам жизни в результате дегенерации боковых частей межпозвонкового диска. Они ограничивают боковое смещение, но при остеоартрозе их остеофиты сужают межпозвонковое отверстие и могут сдавливать корешки C4–C8. Это одна из причин шейной радикулопатии у людей среднего возраста.'},

  {cat:'bones',
   q:'Позвонок C7 называют vertebra prominens. Почему и как его использовать при пальпации?',
   correct:'Самый длинный нераздвоенный остистый отросток шейного отдела — легко пальпируется при опущенной голове; ориентир для отсчёта уровней позвоночника',
   wrong:['Самый крупный поперечный отросток с отверстием для позвоночной артерии','Позвонок с самым большим телом — основа для крепления мышц шеи','Единственный шейный позвонок без межпозвонкового диска'],
   exp:'C7 — переходный позвонок между шейным и грудным отделами. При наклоне головы вперёд его остистый отросток выступает сильнее всего — удобный ориентир. У части людей сильнее выступает T1, поэтому нужно пальпировать оба и выбрать тот, что смещается при движении головы (C7 движется, T1 — нет или минимально).'},

  {cat:'bones',
   q:'Через что проходит позвоночная артерия в шейном отделе и начиная с какого уровня?',

   wrong:['Через межпозвонковые отверстия C7–C1 рядом с нервными корешками','Через тело позвонков по специальному каналу C5–C1','Снаружи от поперечных отростков, прилегая к длинной мышце шеи'],
   exp:'Позвоночная артерия — ветвь подключичной артерии. Входит в отверстия поперечных отростков на уровне C6 (редко C7). Особо уязвима при огибании атланта — именно здесь она может сдавливаться при резкой ротации и разгибании шеи (тест Де Кляйна). Это главная причина осторожности при массаже подзатылочной области и противопоказания к форсированным манипуляциям.'},

  /* ── ГКСМ ── */
  {cat:'scm',

   exp:'ГКСМ — главный визуальный ориентир шеи: при повороте головы в сторону, противоположную мышце, она чётко выступает под кожей. Две головки образуют небольшой треугольник у рукоятки грудины — в нём расположена яремная вырезка. Иннервация — добавочный нерв (XI ЧМН) + C2–C3.'},

  {cat:'scm',
   q:'При одностороннем сокращении ГКСМ производит...',
   correct:'Наклон головы в свою сторону + ротацию лица в противоположную сторону',

  {cat:'scm',
   q:'Триггерные точки ГКСМ дают отражённую боль в...',
   correct:'Вокруг глаза, над бровью, в скуловую область, в затылок, в ухо — имитируют мигрень, синусит, атипичную лицевую боль',

   exp:'ГКСМ — «великая притворщица» по Трэвелл и Саймонс. Её триггерные точки могут имитировать: мигрень, синусит, боль в ухе, атипичную лицевую боль, головокружение (особенно ключичная головка — через нарушение проприорецепции). Это объясняет, почему массаж шеи нередко устраняет «необъяснимые» головные боли.'},

   exp:'Врождённая кривошея — одна из причин асимметрии черепа у детей (плагиоцефалия). Лечение: массаж ГКСМ, растяжка, в тяжёлых случаях — хирургия. У взрослых приобретённая кривошея может быть вызвана спазмом ГКСМ при остеохондрозе, травме или рефлекторно при боли. Важно дифференцировать с дистонической кривошеей (нейрологическое).'},

  /* ── ЛЕСТНИЧНЫЕ ── */
  {cat:'scalen',
   q:'Три лестничные мышцы (передняя, средняя, задняя) — к чему они прикрепляются снизу?',
   correct:'Передняя и средняя — к первому ребру; задняя — ко второму ребру',

   exp:'Это важно для понимания синдрома лестничных мышц: передняя лестничная прикрепляется к scalene tubercle первого ребра, средняя — чуть позади. Между ними проходит плечевое сплетение и подключичная артерия. Отсюда — компрессия сосудисто-нервного пучка при гипертонусе лестничных мышц.'},

  {cat:'scalen',

   exp:'Лестничные — вспомогательные мышцы вдоха: поднимают верхние рёбра, увеличивая объём грудной клетки. При хроническом стрессе и верхнегрудном дыхании они постоянно перегружены и укорочены. Именно поэтому работа с дыханием (диафрагмальный тип) — часть подхода к лечению синдрома лестничных мышц.'},

   q:'Синдром лестничных мышц (scalene syndrome) — что сдавливается и какие симптомы?',

   exp:'Синдром лестничных — часть синдрома грудного выхода (thoracic outlet syndrome). Симптомы: боль и онемение по медиальной поверхности руки (С8–Т1 дерматом), слабость кисти, при артериальной компрессии — бледность и похолодание пальцев. Провокационный тест Адсона: пульс ослабевает при повороте головы в сторону и глубоком вдохе. Массаж лестничных мышц — эффективная консервативная мера.'},

  {cat:'scalen',
   q:'Между какими структурами проходит плечевое сплетение в области шеи?',
   correct:'Между передней и средней лестничными мышцами (межлестничный промежуток)',
   wrong:['Между ГКСМ и трапецией','Позади задней лестничной мышцы, под кожей','Между средней и задней лестничными мышцами'],
   exp:'Плечевое сплетение (C5–T1) формируется между передней и средней лестничными — это первое «бутылочное горлышко» на пути к руке. Второе — под ключицей (реберно-ключичный промежуток), третье — под малой грудной мышцей. При массаже поперечное разминание передней лестничной нужно выполнять очень осторожно — рядом сонная артерия и яремная вена.'},

  /* ── ГЛУБОКИЕ МЫШЦЫ ── */
  {cat:'deep',
   q:'Длинная мышца шеи (m. longus colli) — почему она важна для массажиста?',
   correct:'Главный глубокий сгибатель шеи; при слабости формируется «позиция военного» — потеря шейного лордоза; ослаблена при синдроме верхнего перекрёста',
   wrong:['Главный разгибатель шеи; при слабости — гиперлордоз шеи','Стабилизатор лопатки; при слабости — крыловидная лопатка','Вращатель шеи; при спазме — кривошея'],
   exp:'Longus colli и longus capitis — глубокие сгибатели шеи (ДСШ). Они расположены прямо на телах шейных позвонков (предпозвоночно) и обеспечивают «кивковое» движение с поддержанием шейного лордоза. При синдроме верхнего перекрёста по Янде они ослаблены, а поверхностные сгибатели (ГКСМ, лестничные) компенсаторно перегружены. Прямой массаж к ним невозможен — доступны только через упражнения.'},

  {cat:'deep',
   q:'Подзатылочные мышцы (4 штуки) — каковы их главные функции?',
   correct:'Тонкая регуляция положения головы на атланте и атланта на осевом позвонке: кивание, наклон, ротация в сегментах C0–C1–C2; богаты проприорецепторами',
   wrong:['Грубые движения головы: сгибание и разгибание шейного отдела в целом','Стабилизация лопатки и плечевого пояса','Вспомогательные мышцы вдоха: поднимают первые рёбра'],
   exp:'Подзатылочные мышцы содержат рекордное количество мышечных веретён (проприорецепторов) на единицу объёма — они скорее «датчики положения», чем силовые. При хронической дисфункции (работа за компьютером, выдвинутая голова) теряют чувствительность → нарушается постуральный контроль. Нежный массаж подзатылочной области восстанавливает не только миофасциальный тонус, но и проприоцепцию.'},

  {cat:'deep',
   q:'Ременная мышца головы (m. splenius capitis) при двустороннем сокращении...',
   correct:'Разгибает голову и шею',
   wrong:['Сгибает голову и шею','Производит только ротацию без сагиттального движения','Поднимает плечевой пояс'],
   exp:'Splenius capitis — поверхностная мышца задней шеи, хорошо доступная при массаже. При одностороннем сокращении — ипсилатеральный поворот и боковой наклон. Начинается от выйной связки и остистых отростков C7–T3, крепится к сосцевидному отростку и верхней выйной линии. Триггерные точки дают боль «внутри головы» — тупую боль в темени.'},

  {cat:'deep',
   q:'Полуостистая мышца головы (m. semispinalis capitis) — её прикрепление и паттерн боли от триггерных точек?',
   correct:'Крепится между верхней и нижней выйными линиями затылочной кости; триггерные точки — боль в затылке, переходящая в висок и за глаз (имитирует мигрень)',
   wrong:['Крепится к сосцевидному отростку; боль распространяется в шею и трапецию','Крепится к остистым отросткам C2–C4; боль в верхней трапеции','Крепится к ости лопатки; боль в надлопаточной области'],
   exp:'Semispinalis capitis — крупная мышца, формирующая объём задней шеи. Её триггерные точки — классика при головных болях напряжения и цервикогенных болях. Большой затылочный нерв (ветвь C2) прободает семиспинальную — при гипертонусе мышца может сдавливать нерв → затылочная невралгия. Именно поэтому нежный массаж этой мышцы так эффективен при головных болях.'},

  /* ── ПОДПОДЪЯЗЫЧНЫЕ ── */
  {cat:'hyoid',

function shuffleArr(a){
  var b=a.slice();
  for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}
  return b;
}

var shuffledQS=shuffleArr(QS);
var cur=0,score=0,answered=false;
var catScores={};
CATS.forEach(function(c){catScores[c.id]={ok:0,tot:0}});
QS.forEach(function(q){catScores[q.cat].tot++});
function getCat(id){return CATS.find(function(c){return c.id===id})}
function setProgress(n,t){document.getElementById('prog-fill').style.width=(n/t*100)+'%'}
var currentCorrectIdx=0;

function showQ(){
  var q=shuffledQS[cur];
  var cat=getCat(q.cat);
  var badge=document.getElementById('cat-badge');
  badge.textContent=cat.name;
  badge.style.background=cat.bg;
  badge.style.color=cat.color;
  document.getElementById('counter').textContent='Вопрос '+(cur+1)+' из '+shuffledQS.length;
  document.getElementById('qtext').textContent=q.q;
  var expBox=document.getElementById('exp-box');
  expBox.style.display='none';
  expBox.textContent=q.exp;
  var nextBtn=document.getElementById('next-btn');
  nextBtn.style.display='none';
  nextBtn.textContent=(cur===shuffledQS.length-1)?'Посмотреть результаты →':'Следующий вопрос →';
  var opts4=[q.correct].concat(q.wrong);
  var shuffledOpts=shuffleArr(opts4);
  currentCorrectIdx=shuffledOpts.indexOf(q.correct);
  var optsDiv=document.getElementById('options');
  optsDiv.innerHTML='';
  shuffledOpts.forEach(function(txt,i){
    var btn=document.createElement('button');
    btn.className='opt';
    btn.textContent=txt;
    btn.dataset.idx=i;
    optsDiv.appendChild(btn);
  });
  answered=false;
}

document.getElementById('options').addEventListener('click',function(e){
  var btn=e.target.closest('.opt');
  if(!btn||answered)return;
  answered=true;
  var chosen=parseInt(btn.dataset.idx);
  var correct=currentCorrectIdx;
  var q=shuffledQS[cur];
  var allBtns=document.querySelectorAll('.opt');
  allBtns.forEach(function(b){b.disabled=true});
  allBtns[correct].classList.add('correct');
  if(chosen!==correct){allBtns[chosen].classList.add('wrong')}
  if(chosen===correct){score++;catScores[q.cat].ok++}
  document.getElementById('exp-box').style.display='block';
  document.getElementById('next-btn').style.display='inline-block';
});

document.getElementById('next-btn').addEventListener('click',function(){
  cur++;
  if(cur>=shuffledQS.length){showResults();return}
  setProgress(cur,shuffledQS.length);
  showQ();
});

document.getElementById('restart-btn').addEventListener('click',function(){
  cur=0;score=0;answered=false;
  CATS.forEach(function(c){catScores[c.id]={ok:0,tot:catScores[c.id].tot}});
  shuffledQS=shuffleArr(QS);
  document.getElementById('result-box').style.display='none';
  document.getElementById('quiz-area').style.display='block';
  setProgress(0,shuffledQS.length);
  showQ();
});

function showResults(){
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('result-box').style.display='block';
  setProgress(shuffledQS.length,shuffledQS.length);
  var total=shuffledQS.length;
  var pct=Math.round(score/total*100);
  var grades=[
    {min:90,txt:'Отлично — профессиональный уровень',col:'#2d7a2d'},
    {min:75,txt:'Хорошо — крепкая база',col:'#BA7517'},
    {min:60,txt:'Удовлетворительно — есть зоны для работы',col:'#534AB7'},
    {min:0,txt:'Нужно повторить — анатомия требует практики',col:'#993C1D'}
  ];
  var g=grades.find(function(x){return pct>=x.min});
  document.getElementById('res-sub').textContent=g.txt;
  document.getElementById('res-sub').style.color=g.col;
  document.getElementById('sc-ok').textContent=score;
  document.getElementById('sc-err').textContent=total-score;
  document.getElementById('sc-pct').textContent=pct+'%';
  var cr=document.getElementById('cat-results');
  cr.innerHTML='';
  CATS.forEach(function(cat){
    var s=catScores[cat.id];
    if(!s||s.tot===0)return;
    var p=Math.round(s.ok/s.tot*100);
    var row=document.createElement('div');
    row.className='cat-row';
    row.innerHTML='<span class="cr-name">'+cat.name+'</span>'
      +'<div class="cr-bar-bg"><div class="cr-bar" style="width:'+p+'%;background:'+cat.color+'"></div></div>'
      +'<span class="cr-val">'+s.ok+'/'+s.tot+'</span>';
    cr.appendChild(row);
  });
}

showQ();
