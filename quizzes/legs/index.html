    <script>
var CATS=[
  {id:'bones',name:'Кости и ориентиры',color:'#1D9E75',bg:'#E1F5EE'},
  {id:'ant',name:'Передняя группа бедра',color:'#185FA5',bg:'#E6F1FB'},
  {id:'ham',name:'Хамстринги',color:'#BA7517',bg:'#FAEEDA'},

  {id:'glut',name:'Ягодичные и ротаторы',color:'#993C1D',bg:'#FAECE7'},
  {id:'leg',name:'Мышцы голени и стопы',color:'#3B6D11',bg:'#EAF3DE'},
  {id:'nerve',name:'Нервы',color:'#993556',bg:'#FBEAF0'},
  {id:'foot',name:'Стопа, фасция и своды',color:'#6E4A2E',bg:'#F2EBE3'},
  {id:'pelvis',name:'Пояс нижних конечностей',color:'#7B5EA7',bg:'#F0EDFB'},
  {id:'knee',name:'Коленный сустав',color:'#2E6EA6',bg:'#E3EEF9'}
];

var QS=[
  {cat:'bones',q:'«Гусиная лапка» (pes anserinus) — что это?',correct:'Место прикрепления портняжной, тонкой и полусухожильной мышц к медиальной большеберцовой кости',wrong:['Связка коленного сустава','Синовиальная сумка подколенной ямки','Костный выступ малоберцовой кости'],exp:'Pes anserinus находится на медиальной поверхности большеберцовой кости, ~5 см ниже суставной щели. Частая зона бурситов при гиперпронации и плоскостопии. Сюда крепятся три мышцы из разных групп — объединяющий фактор: все они сгибают и внутренне ротируют голень.'},
  {cat:'bones',q:'Ахиллово сухожилие прикрепляется к...',correct:'Пяточному бугру (tuber calcanei) — задняя поверхность пяточной кости',wrong:['Таранной кости','Ладьевидной кости','Основанию 5-й плюсневой кости'],exp:'Tendo calcaneus — самое толстое сухожилие тела. Крепится к задней поверхности пяточной кости. Пальпируется при работе с икроножной областью. Зона тендинопатий у бегунов.'},
  {cat:'bones',q:'К головке малоберцовой кости прикрепляется дистально...',correct:'Двуглавая мышца бедра',wrong:['Икроножная мышца','Передняя большеберцовая мышца','Длинная малоберцовая мышца'],exp:'Сухожилие двуглавой хорошо пальпируется у латерального края подколенной ямки. Здесь же огибает шейку малоберцовой общий малоберцовый нерв — зона особой осторожности при массаже.'},
  {cat:'bones',q:'Большой вертел бедренной кости — место прикрепления...',correct:'Средней и малой ягодичных мышц',wrong:['Большой ягодичной мышцы','Подвздошно-поясничной мышцы','Двуглавой мышцы бедра'],exp:'К большому вертелу крепятся средняя и малая ягодичные. Большая ягодичная идёт к ягодичной бугристости и ИБТ, а iliopsoas — к малому вертелу. Большой вертел — ключевой пальпаторный ориентир боковой поверхности бедра.'},
  {cat:'bones',q:'Куда прикрепляется подвздошно-поясничная мышца (iliopsoas)?',correct:'К малому вертелу (trochanter minor) бедренной кости',wrong:['К большому вертелу','К ягодичной бугристости','К передней нижней ости подвздошной кости'],exp:'Малый вертел — на задне-медиальной поверхности проксимального отдела бедра. Укорочение iliopsoas ограничивает разгибание в тазобедренном суставе и создаёт гиперлордоз поясницы.'},
  {cat:'ant',q:'Из каких четырёх головок состоит m. quadriceps femoris?',correct:'Прямая, медиальная широкая, латеральная широкая, промежуточная широкая',wrong:['Прямая, медиальная, боковая, задняя','Длинная, короткая, прямая, косая','Передняя, задняя, медиальная, латеральная'],exp:'Четырёхглавая — крупнейшая мышца по объёму. Только rectus femoris начинается от AIIS и является двусуставной (тазобедренный + коленный). Остальные три начинаются от бедренной кости.'},
  {cat:'ant',q:'Куда прикрепляется весь квадрицепс дистально?',correct:'К надколеннику → через связку надколенника → к бугристости большеберцовой кости',wrong:['К головке малоберцовой кости','К медиальному мыщелку большеберцовой кости','Непосредственно к ладьевидной кости стопы'],exp:'Надколенник — сесамовидная кость в сухожилии квадрицепса. Lig. patellae продолжает его к tuberositas tibiae. Надколенник увеличивает момент разгибания примерно на 30%.'},
  {cat:'ant',q:'Только rectus femoris — двусуставная мышца квадрицепса. Что это означает функционально?',correct:'Она дополнительно сгибает бедро в тазобедренном суставе',wrong:['Она разгибает бедро в тазобедренном суставе','Она приводит бедро','Она производит наружную ротацию бедра'],exp:'Rectus femoris начинается от AIIS и пересекает тазобедренный сустав. При растяжке квадрицепса — обязательно разгибать бедро, чтобы растянуть rectus. Именно эта головка чаще страдает при тендинопатии.'},
  {cat:'ant',q:'Портняжная мышца (m. sartorius) начинается от...',correct:'Передней верхней ости подвздошной кости (ASIS)',wrong:['Передней нижней ости подвздошной кости','Гребня подвздошной кости','Лобкового симфиза'],exp:'Sartorius — самая длинная мышца тела (~53 см). ASIS легко пальпируется в паховой области. Мышца идёт косо и прикрепляется в составе «гусиной лапки» к медиальной большеберцовой кости.'},
  {cat:'ant',q:'Функции портняжной мышцы (m. sartorius)?',correct:'Сгибание + отведение + наружная ротация бедра; сгибание + внутренняя ротация голени',wrong:['Только сгибание бедра','Разгибание бедра и сгибание голени','Приведение бедра и разгибание голени'],exp:'Sartorius обеспечивает позу «нога на ногу». Двусуставная: воздействует на тазобедренный и коленный. Хорошо прощупывается как косая «лента» по передне-медиальной поверхности бедра.'},
  {cat:'ant',q:'Подвздошно-поясничная мышца (iliopsoas) состоит из...',correct:'Подвздошной (iliacus) и большой поясничной (psoas major)',wrong:['Подвздошной и малой поясничной','Поясничной и грушевидной','Прямой мышцы бедра и подвздошной'],exp:'Iliacus начинается от подвздошной ямки, psoas major — от тел и поперечных отростков L1–L5. Главная функция — сгибание бедра. Напряжение — частая причина боли в пояснице и ограничения разгибания в ТБС.'},
  {cat:'ham',q:'Какие три мышцы образуют группу хамстрингов?',correct:'Двуглавая мышца бедра, полусухожильная и полуперепончатая',wrong:['Двуглавая, портняжная и полусухожильная','Большая приводящая, двуглавая и полуперепончатая','Полусухожильная, тонкая и полуперепончатая'],exp:'Все три начинаются от седалищного бугра (кроме короткой головки двуглавой). Двусуставные: разгибают бедро + сгибают голень. Классическая зона укорочения при сидячем образе жизни.'},
  {cat:'ham',q:'Длинная головка двуглавой мышцы бедра начинается от...',correct:'Седалищного бугра (tuber ischiadicum)',wrong:['Задней поверхности бедренной кости','Крестца','Большого вертела'],exp:'Седалищный бугор — костный выступ, ощутимый при сидении. Общая точка начала хамстрингов. Триггерные точки у седалищного бугра дают боль в ягодице и по задней поверхности бедра.'},
  {cat:'ham',q:'Куда дистально прикрепляется двуглавая мышца бедра?',correct:'К головке малоберцовой кости',wrong:['К медиальному мыщелку большеберцовой кости','К пяточной кости','К латеральному надмыщелку бедра'],exp:'Сухожилие двуглавой пальпируется у латерального края подколенной ямки. Рядом проходит общий малоберцовый нерв — глубокое давление здесь требует осторожности.'},
  {cat:'ham',q:'Полусухожильная и полуперепончатая прикрепляются к...',correct:'Медиальной поверхности проксимального конца большеберцовой кости',wrong:['Головке малоберцовой кости','Латеральному мыщелку большеберцовой','Медиальному надмыщелку бедра'],exp:'Полусухожильная входит в «гусиную лапку». Полуперепончатая крепится чуть глубже. Оба сухожилия пальпируются у медиального края подколенной ямки.'},
  {cat:'ham',q:'Общая функция хамстрингов?',correct:'Разгибание бедра в ТБС + сгибание голени в коленном суставе',wrong:['Сгибание бедра и разгибание голени','Приведение бедра и сгибание голени','Наружная ротация бедра и сгибание голени'],exp:'Хамстринги — антагонисты квадрицепса. При ходьбе тормозят разгибание голени. Укорочение ограничивает наклон вперёд (тест Ласега). Одна из ключевых зон в спортивном и релаксирующем массаже.'},
  {cat:'ham',q:'При согнутом колене двуглавая мышца ротирует голень... а медиальные хамстринги — ...',correct:'Кнаружи (двуглавая) / кнутри (полусухожильная и полуперепончатая)',wrong:['Обе группы — наружная ротация','Обе группы — внутренняя ротация','Кнутри (двуглавая) / кнаружи (медиальные)'],exp:'Двуглавая — латеральная, поэтому ротирует голень кнаружи. Медиальные хамстринги — кнутри. Это позволяет дифференцировать вовлечённость при ротационных тестах колена.'},
  {cat:'ham',q:'Триггерные точки хамстрингов чаще всего вызывают боль в...',correct:'Задней поверхности бедра, подколенной ямке и задней голени',wrong:['Передней поверхности бедра','Паховой области','Боковой поверхности колена'],exp:'Классический паттерн по Трэвелл и Саймонс: боль вдоль всей задней поверхности ноги. Точки у седалищного бугра — в ягодицу; по ходу мышцы — в подколенную ямку и голень. Часто имитируют ишиас.'},
  {cat:'add',q:'Какие мышцы образуют медиальную (приводящую) группу бедра?',correct:'Длинная, короткая и большая приводящие + гребенчатая + тонкая',wrong:['Длинная и короткая приводящие + портняжная + тонкая','Большая приводящая + полусухожильная + гребенчатая','Тонкая + квадратная + гребенчатая + внутренняя запирательная'],exp:'Пять мышц, иннервируются преимущественно запирательным нервом (L2–L4). Исключение: разгибательная часть большой приводящей иннервируется ветвью седалищного нерва.'},
  {cat:'add',q:'Большая приводящая мышца — её уникальная двойная иннервация?',correct:'Запирательный нерв (приводящая часть) + седалищный нерв (разгибательная часть)',wrong:['Бедренный нерв + запирательный','Седалищный нерв + бедренный','Запирательный нерв + верхний ягодичный'],exp:'M. adductor magnus — крупнейшая из приводящих. «Разгибательная» часть функционально похожа на хамстринги. Важно при дифдиагностике боли по медиальной поверхности бедра.'},
  {cat:'add',q:'Функции тонкой мышцы (m. gracilis)?',correct:'Приведение бедра + сгибание + внутренняя ротация голени',wrong:['Только приведение бедра','Отведение бедра и разгибание голени','Сгибание бедра и разгибание голени'],exp:'Gracilis — единственная двусуставная мышца медиальной группы. Её сухожилие пальпируется по медиальной поверхности колена, входит в «гусиную лапку». При массаже медиальной поверхности бедра работать мягко — здесь проходит запирательный нерв.'},
  {cat:'add',q:'Общая функция приводящих мышц?',correct:'Приведение бедра к средней линии + вспомогательные сгибатели и ротаторы',wrong:['Только отведение бедра','Разгибание в тазобедренном суставе','Исключительно наружная ротация'],exp:'Приводящие активны при сдавлении предмета между коленями и при ходьбе (стабилизация таза). При длительном сидении с разведёнными бёдрами — растянуты и ослаблены.'},
  {cat:'glut',q:'Главная функция большой ягодичной мышцы (m. gluteus maximus)?',correct:'Разгибание и наружная ротация бедра',wrong:['Отведение бедра','Сгибание бедра','Внутренняя ротация бедра'],exp:'Gluteus maximus — самая крупная мышца тела. Активно включается при подъёме из приседа, ходьбе по лестнице, беге. При ровной ходьбе задействована минимально.'},
  {cat:'glut',q:'Куда крепится большая ягодичная мышца?',correct:'К ягодичной бугристости бедра и подвздошно-большеберцовому тракту (ИБТ)',wrong:['К большому вертелу','К малому вертелу','К крестцово-подвздошной связке'],exp:'~75% волокон крепится к ягодичной бугристости, ~25% — к ИБТ. Именно через ИБТ большая ягодичная влияет на состояние коленного сустава.'},
  {cat:'glut',q:'Средняя и малая ягодичные выполняют ключевую функцию при ходьбе. Какую?',correct:'Отведение бедра и стабилизация таза в одноопорной фазе (предотвращают «провал» противоположного таза)',wrong:['Разгибание бедра при отталкивании','Сгибание бедра при переносе ноги','Наружная ротация опорной ноги'],exp:'Слабость этих мышц — признак Тренделенбурга: таз «проваливается» на сторону свободной ноги. Ключевой функциональный тест. При массаже пальпируются кнаружи и кзади от большого вертела.'},
  {cat:'glut',q:'Грушевидная мышца (m. piriformis) при разогнутом бедре выполняет...',correct:'Наружную ротацию бедра (+ небольшое отведение)',wrong:['Внутреннюю ротацию бедра','Приведение бедра','Сгибание бедра'],exp:'При сгибании бедра >60° грушевидная меняет роль и становится внутренним ротатором. Прикрепляется к медиальной поверхности большого вертела. Важна для стабилизации крестцово-подвздошного сустава.'},
  {cat:'glut',q:'Синдром грушевидной мышцы вызывает...',correct:'Боль в ягодице с иррадиацией по ходу седалищного нерва (псевдоишиас)',wrong:['Только локальную боль в ягодице без иррадиации','Боль по передней поверхности бедра','Боль только в паховой области'],exp:'У ~15–20% людей седалищный нерв проходит через грушевидную. Спазм → сдавление нерва. Массаж глубоких ягодичных — эффективная техника. Тест FAIR (сгибание-приведение-внутренняя ротация) провоцирует симптомы.'},
  {cat:'glut',q:'«Глубокая шестёрка» — наружные ротаторы бедра. Назовите их.',correct:'Грушевидная, внутренняя и наружная запирательные, квадратная мышца бедра, верхняя и нижняя близнецовые',wrong:['Грушевидная, средняя и малая ягодичные, квадратная, близнецовые','Грушевидная, гребенчатая, запирательные, большая приводящая, близнецовые','Квадратная, запирательные, гребенчатая, тонкая, грушевидная, подвздошная'],exp:'«Глубокая шестёрка» — аналог ротаторной манжеты для ТБС: стабилизируют головку бедра в вертлужной впадине. Все крепятся к большому вертелу. Работа с ними через ягодичную область требует точного знания топографии.'},
  {cat:'leg',q:'Трёхглавая мышца голени (m. triceps surae) состоит из...',correct:'Икроножной (две головки) и камбаловидной мышц',wrong:['Икроножной и подошвенной','Трёх отдельных икроножных','Камбаловидной, подошвенной и задней большеберцовой'],exp:'Икроножная — двусуставная (пересекает колено и голеностоп), камбаловидная — односуставная (только голеностоп). Для растяжки икроножной — нога прямая; для камбаловидной — колено согнуто.'},
  {cat:'leg',q:'Икроножная мышца (m. gastrocnemius) проксимально прикрепляется к...',correct:'Медиальному и латеральному надмыщелкам бедренной кости',wrong:['Мыщелкам большеберцовой кости','Головке малоберцовой кости','Подколенной поверхности бедра'],exp:'Начинается выше суставной щели колена. Поэтому при разогнутом колене икроножная натянута. При согнутом — можно расслабить и растянуть. Ключевое отличие от камбаловидной.'},
  {cat:'leg',q:'Камбаловидная мышца (m. soleus) называется «периферическим сердцем». Почему?',correct:'Её ритмичные сокращения активно перекачивают венозную кровь из ног вверх',wrong:['Она расположена близко к сердцу','Она имеет сердцеобразную форму','Её иннервация связана с сердечными нервами'],exp:'Soleus содержит преимущественно медленные (тонические) волокна и работает постоянно. Её мощные сокращения — главный насос венозного возврата из нижних конечностей. Важнейшая зона при работе с отёками.'},
  {cat:'leg',q:'Функция трёхглавой мышцы голени?',correct:'Подошвенное сгибание стопы; икроножная также сгибает голень',wrong:['Тыльное сгибание стопы','Подошвенное сгибание + разгибание пальцев','Супинация и отведение стопы'],exp:'Трёхглавая — главный подошвенный сгибатель: обеспечивает отталкивание при ходьбе и беге. Укорочение — распространённая причина ограничения тыльного сгибания.'},
  {cat:'leg',q:'Передняя большеберцовая мышца (m. tibialis anterior) выполняет...',correct:'Тыльное сгибание и инверсию (супинацию) стопы',wrong:['Подошвенное сгибание и пронацию','Тыльное сгибание и пронацию','Только тыльное сгибание без ротации'],exp:'Tibialis anterior — главный тыльный сгибатель: поднимает стопу при ходьбе (фаза переноса). Вместе с задней большеберцовой формирует «стременную петлю» поддержки медиального свода.'},
  {cat:'leg',q:'Длинная малоберцовая мышца (m. peroneus longus) — её функция?',correct:'Подошвенное сгибание + эверсия (пронация) стопы + поддержка поперечного свода',wrong:['Тыльное сгибание и инверсия','Только эверсия без сгибания','Разгибание пальцев и эверсия'],exp:'Сухожилие огибает латеральную лодыжку и проходит через подошву к медиальной клиновидной. Вместе с tibialis anterior — «стремя» поперечного свода. Важна при коррекции пронации стопы.'},
  {cat:'leg',q:'Задняя большеберцовая мышца (m. tibialis posterior) — её дисфункция связана с...',correct:'Приобретённым плоскостопием и болью по медиальной голени',wrong:['Варусной деформацией стопы','Подошвенным фасциитом','Синдромом малоберцовых мышц'],exp:'Tibialis posterior — главный инвертор стопы и динамический поддерживатель медиального продольного свода. Её тендинопатия — ведущая причина приобретённого плоскостопия у взрослых.'},
  {cat:'leg',q:'Подошвенная мышца (m. plantaris) — её особенность?',correct:'Рудиментарная; её разрыв имитирует разрыв ахиллова; сухожилие используют для пластики',wrong:['Главный подошвенный сгибатель стопы','Сгибатель всех пальцев стопы','Стабилизатор коленного сустава'],exp:'Plantaris: маленькое брюшко (~7–10 см), очень длинное сухожилие (~30 см). Отсутствует у ~10% людей. Разрыв — ощущение «удара мячом». Дифференцируют с разрывом ахиллова. Сухожилие используют в реконструктивной хирургии.'},
  {cat:'nerve',q:'Из каких сегментов формируется седалищный нерв?',correct:'L4, L5, S1, S2, S3',wrong:['L2, L3, L4, L5','L3, L4, L5, S1','L5, S1, S2, S3, S4'],exp:'Седалищный нерв — крупнейший нерв тела (до 2 см диаметром). Выходит через большое седалищное отверстие, обычно под грушевидной мышцей. Знание его проекции критически важно при массаже ягодичной области.'},
  {cat:'nerve',q:'Бедренный нерв (n. femoralis, L2–L4) иннервирует...',correct:'Квадрицепс, портняжную, подвздошно-поясничную; кожа передней и медиальной поверхности бедра',wrong:['Хамстринги и большую ягодичную','Приводящие мышцы и медиальную голень','Ягодичные мышцы и наружные ротаторы'],exp:'Бедренный нерв — крупнейшая ветвь поясничного сплетения. Проходит через паховую связку латеральнее бедренной артерии. Подкожный нерв (n. saphenus) — его конечная ветвь — иннервирует медиальную голень до внутренней лодыжки.'},
  {cat:'nerve',q:'На какие ветви делится седалищный нерв?',correct:'На большеберцовый (n. tibialis) и общий малоберцовый (n. fibularis communis) — в подколенной ямке',wrong:['На бедренный и запирательный — в паховой области','На поверхностный и глубокий малоберцовый — у головки малоберцовой','На большеберцовый и подкожный — в средней части бедра'],exp:'Деление в подколенной ямке. Большеберцовый → задняя группа голени + подошва; малоберцовый → передняя и боковая группы + тыл стопы.'},
  {cat:'nerve',q:'Общий малоберцовый нерв огибает шейку малоберцовой кости. Клиническое значение?',correct:'Нерв крайне поверхностен → сдавление вызывает «свисающую стопу» (foot drop)',wrong:['Здесь он даёт ветви к хамстрингам','Это место отхождения ветви к ягодичным','Нерв уходит глубоко и защищён мышцами'],exp:'Компрессия у головки малоберцовой (гипс, скрещивание ног, давление края стола) → «свисающая стопа»: невозможность тыльного сгибания. Массажист должен избегать давления на эту зону.'},
  {cat:'nerve',q:'Запирательный нерв (n. obturatorius, L2–L4) иннервирует...',correct:'Приводящие мышцы бедра; кожа медиальной поверхности бедра',wrong:['Ягодичные мышцы и наружные ротаторы','Переднюю поверхность бедра и квадрицепс','Мышцы голени и стопы'],exp:'Запирательный нерв выходит через запирательный канал на медиальную поверхность бедра. Раздражение → боль в паховой области и по медиальной поверхности бедра. Важно дифференцировать с патологией ТБС.'},
  {cat:'nerve',q:'Тарзальный канал (позади медиальной лодыжки). Что через него проходит?',correct:'Большеберцовый нерв + задние большеберцовые сосуды + сухожилия сгибателей',wrong:['Общий малоберцовый нерв','Подкожный нерв (n. saphenus)','Глубокий малоберцовый нерв'],exp:'Синдром тарзального канала (аналог карпального): жжение и онемение подошвы. При массаже медиальной лодыжки — умеренная интенсивность давления.'},
  {cat:'foot',q:'Подошвенный апоневроз (plantar fascia) — откуда начинается и куда крепится?',correct:'От пяточного бугра (tuber calcanei) → к основаниям проксимальных фаланг всех пяти пальцев',wrong:['От ладьевидной кости → к дистальным фалангам пальцев','От кубовидной кости → к основанию 5-й плюсневой','От таранной кости → к пяточной кости'],exp:'Подошвенный апоневроз — главный статический стабилизатор продольного свода стопы. Работает как «тетива лука»: пяточная кость и пальцы — концы дуги, апоневроз — тетива. При ходьбе разгибание пальцев натягивает апоневроз → свод «поднимается» (windlass mechanism). Подошвенный фасциит — воспаление у места прикрепления к пяточному бугру — одна из самых частых причин боли в стопе. При массаже стопы апоневроз массируют от пятки к пальцам поперечным трением.'},
  {cat:'foot',q:'Мышца отводящая большой палец стопы (m. abductor hallucis) — где она и зачем важна при массаже?',correct:'Идёт по медиальному краю подошвы от пяточного бугра к основанию проксимальной фаланги большого пальца; укрепляет медиальный свод и отводит большой палец',wrong:['Расположена на тыле стопы — разгибает большой палец','Идёт от ладьевидной кости к большому пальцу — главный сгибатель','Расположена в первом межпальцевом промежутке'],exp:'Abductor hallucis — первое, что пальпируется на медиальном крае подошвы. При плоскостопии и вальгусной деформации большого пальца (hallux valgus) она смещается под стопу и теряет функцию. Хорошо доступна при массаже подошвы — работа большим пальцем вдоль медиального края от пятки к плюснефаланговому суставу. Слабость этой мышцы — один из факторов развития плоскостопия.'},
  {cat:'foot',q:'Короткий сгибатель пальцев стопы (m. flexor digitorum brevis) — аналог чего на руке?',correct:'Аналог червеобразных и поверхностного сгибателя пальцев руки; начинается от пяточного бугра, сгибает средние фаланги 2–5 пальцев',wrong:['Аналог разгибателей пальцев — разгибает пальцы при ходьбе','Аналог межкостных мышц кисти — отводит и приводит пальцы','Аналог thenar — отвечает только за большой палец'],exp:'FDB лежит прямо под подошвенным апоневрозом — второй слой подошвы. Начинается от пяточного бугра и медиальной поверхности подошвенного апоневроза. Его сухожилия раздваиваются и охватывают сухожилия длинного сгибателя (как на руке). При массаже подошвы поперечное разминание в средней части воздействует именно на эту мышцу. Слабость FDB + слабость abductor hallucis = коллапс продольного свода.'},
  {cat:'foot',q:'Три свода стопы — назовите их и что их поддерживает динамически?',correct:'Медиальный продольный (самый высокий), латеральный продольный и поперечный; динамически поддерживаются мышцами: tibialis posterior, peroneus longus, intrinsic muscles',wrong:['Только два свода: продольный и поперечный; поддерживаются исключительно связками','Четыре свода: два продольных и два поперечных; мышцы роли не играют','Один свод — продольный; поперечного свода у человека нет'],exp:'Медиальный продольный свод — самый клинически значимый: от пяточного бугра через таранную и ладьевидную кости к 1-й плюсневой. Его «ключевой камень» — таранная кость. Поддержка: статически — подошвенный апоневроз и связки; динамически — tibialis posterior (главный!), peroneus longus, intrinsic мышцы. Поперечный свод на уровне оснований плюсневых костей поддерживается peroneus longus (тянет 1-ю плюсневую вниз) и tibialis anterior. При массаже стопы работа с подошвой восстанавливает тонус intrinsic мышц → улучшает динамическую поддержку сводов.'},
  {cat:'foot',q:'Голеностопный сустав — какое движение в нём основное и какие связки чаще всего травмируются?',correct:'Основное движение — сагиттальное (тыльное и подошвенное сгибание); чаще всего травмируются латеральные связки (ATFL — передняя таранно-малоберцовая) при инверсионном механизме',wrong:['Основное — ротация; чаще травмируются медиальные (дельтовидные) связки','Основное — отведение/приведение; все связки травмируются одинаково часто','Сустав допускает все движения равномерно; связки не травмируются без переломов'],exp:'Голеностопный сустав (tibiofibular + таранная кость) — блоковидный сустав: основные движения в сагиттальной плоскости. Тыльное сгибание ~20°, подошвенное ~50°. При инверсионном растяжении (подворачивание кнутри) — первой рвётся ATFL (anterior talofibular ligament), затем CFL (calcaneofibular). Именно поэтому при массаже после растяжения голеностопа начинают с зоны латеральной лодыжки — там максимальный отёк и болезненность. Дельтовидная связка (медиальная) — значительно мощнее, рвётся редко.'},
  {cat:'foot',q:'Подтаранный сустав (subtalar joint) — что в нём происходит и почему важен при оценке стопы?',correct:'Пронация и супинация (инверсия/эверсия) стопы — движения, которые не происходят в голеностопном; при гиперпронации вся биомеханика цепи нарушается вверх до колена, бедра, поясницы',wrong:['Тыльное и подошвенное сгибание — дублирует голеностопный сустав','Только стабилизация без движения — амортизирующий сустав','Сгибание и разгибание пальцев через рефлекторный механизм'],exp:'Подтаранный сустав (таранная + пяточная кости) — «шарнир пронации». При избыточной пронации пяточная кость заваливается кнаружи → таранная кость ротируется кнутри → тянет большеберцовую кость во внутреннюю ротацию → нагрузка на медиальный отдел колена → компенсаторная ротация бедра. Вот почему боль в колене или бедре иногда решается работой со стопой. При массаже стопы мобилизация пяточной кости (покачивание) влияет на подтаранный сустав.'},
  {cat:'pelvis',q:'Tensor fasciae latae (TFL) и подвздошно-большеберцовый тракт (IT-тракт) — как они связаны и что происходит при их укорочении?',correct:'TFL напрягает IT-тракт сверху; укорочение → синдром IT-тракта: боль по латеральной поверхности колена при беге (трение тракта о латеральный мыщелок бедра)',wrong:['TFL крепится непосредственно к колену без IT-тракта; укорочение → боль в паху','IT-тракт — связка коленного сустава без мышечного компонента','TFL отводит бедро, IT-тракт её не задействует — они независимы'],exp:'IT-тракт (iliotibial band) — утолщение фасции бедра, идущее от гребня подвздошной кости до бугорка Герди большеберцовой кости. Сверху в него вплетаются TFL и часть большой ягодичной. Синдром IT-тракта — самая частая причина боли в латеральном колене у бегунов. При беге тракт многократно «перескакивает» через латеральный мыщелок. Массаж IT-тракта: медленные продольные и поперечные техники по всей длине бедра, особенно в зоне 5–7 см проксимальнее щели коленного сустава — наиболее болезненная точка.'},
  {cat:'pelvis',q:'Тазобедренный сустав — какой тип сустава и какой объём ротации в норме?',correct:'Шаровидный сустав (enarthrosis); внутренняя ротация ~40°, наружная ротация ~45°; ограничение ротации — ранний признак патологии (коксартроз, импинджмент)',wrong:['Блоковидный сустав только с движениями в одной плоскости','Эллипсовидный сустав; ротации нет — только сгибание и разгибание','Седловидный сустав; объём движений одинаков во всех направлениях'],exp:'ТБС — один из самых стабильных суставов: глубокая вертлужная впадина + мощные связки + мышечный корсет. Первым движением, которое ограничивается при коксартрозе, является внутренняя ротация. Тест: пациент лёжа на спине, сгибание колена и бедра до 90° → пассивная ротация бедра. Боль и ограничение внутренней ротации → подозрение на патологию ТБС. Для массажиста: перед работой с «болью в тазобедренном» — базовая оценка объёма ротации.'},
  {cat:'pelvis',q:'Крестцово-подвздошный сустав (КПС) — что это за сустав и какую роль играет?',correct:'Тугоподвижный синовиально-фиброзный сустав между крестцом и подвздошной костью; передаёт нагрузку от позвоночника на нижние конечности; источник боли в пояснице в ~15–30% случаев',wrong:['Полностью неподвижный синостоз без клинического значения','Хрящевой сустав с большим объёмом движений как плечевой','Синовиальный сустав с широкой суставной щелью, легко пальпируемой снаружи'],exp:'КПС — «ключевой камень» таза. Движение в нём минимальное (нутация/контрнутация крестца — 1–3°), но значимое для биомеханики. Стабилизируется мощными связками (крестцово-подвздошные, крестцово-бугорная, крестцово-остистая) и мышцами (грушевидная, многораздельная, gluteus maximus через пояснично-грудную фасцию). Боль в КПС имитирует поясничную радикулопатию и боль в ТБС. Для массажиста: давление на заднюю верхнюю ость подвздошной (PSIS) и работа с грушевидной — воздействие на КПС рефлекторно.'},
  {cat:'pelvis',q:'«Бедренный треугольник» (треугольник Скарпа) — что в нём находится и почему важен при массаже бедра?',correct:'Бедренная артерия, вена и нерв (снаружи внутрь: нерв-артерия-вена); зона осторожного давления — глубокое давление в паху опасно',wrong:['Только лимфатические узлы — бедренный треугольник чисто лимфатическая зона','Запирательный нерв и запирательная артерия — выходят именно здесь','Подвздошно-поясничная мышца и её сухожилие без сосудов'],exp:'Бедренный треугольник ограничен: паховая связка сверху, портняжная мышца латерально, длинная приводящая медиально. Содержимое (снаружи внутрь): бедренный нерв, бедренная артерия, бедренная вена (мнемоника NAVY — Nerve, Artery, Vein от латерального края). Медиальнее вены — бедренный канал с лимфатическими узлами. При массаже передней поверхности бедра избегать глубокого давления в верхней трети медиально — риск компрессии сосудов. Пульсация бедренной артерии — ориентир при работе.'},
  {cat:'pelvis',q:'Лобковый симфиз — что это и при каком синдроме он страдает?',correct:'Хрящевое полусочленение между лобковыми костями; при синдроме лобкового симфизита (у беременных, футболистов) — боль в паху, усиливающаяся при разведении ног и ходьбе',wrong:['Синовиальный сустав с большой подвижностью — основной сустав таза','Костное соединение (синостоз) без клинической значимости','Место прикрепления бедренной фасции к тазу — не сустав'],exp:'Лобковый симфиз — волокнисто-хрящевое соединение, в норме с минимальной подвижностью. У беременных (гормон релаксин размягчает хрящ) и у спортсменов с мощными приводящими мышцами (футбол, хоккей) может развиваться дисфункция симфиза. Боль при разведении ног, подъёме по лестнице, стоянии на одной ноге. Приводящие мышцы тянут лобковые кости навстречу — их гипертонус усугубляет состояние. Массаж приводящих мышц — часть консервативного лечения.'},
  {cat:'knee',q:'Мениски коленного сустава — функция и почему медиальный рвётся чаще латерального?',correct:'Амортизация, распределение нагрузки, стабилизация сустава; медиальный мениск сращён с медиальной коллатеральной связкой → менее подвижен → чаще травмируется',wrong:['Только выработка синовиальной жидкости — амортизации нет','Оба мениска рвутся с одинаковой частотой','Латеральный рвётся чаще — он тоньше и менее защищён'],exp:'Мениски — серповидные волокнисто-хрящевые структуры, покрывающие ~2/3 суставной поверхности большеберцовой кости. Без менисков площадь контакта сокращается на 50% → нагрузка на хрящ возрастает в 2–3 раза. Медиальный мениск сращён с капсулой и MCL → при нагрузке «зажат» → рвётся при скручивании. Классика: спортсмен получает удар снаружи при согнутом колене → вальгус + ротация → разрыв медиального мениска + MCL (+ ACL = «несчастная триада»). При массаже: работа с мышцами вокруг колена снижает компрессию менисков.'},
  {cat:'knee',q:'Крестообразные связки колена — передняя (ACL) и задняя (PCL): какую функцию выполняют?',correct:'ACL — предотвращает передний сдвиг большеберцовой кости и гиперэкстензию; PCL — предотвращает задний сдвиг; вместе — главные стабилизаторы колена в сагиттальной плоскости',wrong:['ACL — стабилизация во фронтальной плоскости (вальгус/варус); PCL — ротационная стабилизация','Обе связки ограничивают только ротацию — вальгус/варус контролируют коллатеральные','ACL — главная связка при разгибании; PCL — при сгибании без стабилизирующей функции'],exp:'ACL рвётся при: резкой смене направления без контакта (бесконтактный механизм — 70%), гиперэкстензии, вальгусном стрессе. Женщины рвут ACL в 4–6 раз чаще мужчин (анатомия таза, гормональные факторы, нейромышечные паттерны). Тест Лахмана — основной для диагностики разрыва ACL. Для массажиста: при нестабильности колена работа с квадрицепсом и хамстрингами — они компенсируют функцию связок. Нестабильное колено требует направления к врачу перед интенсивным массажем.'}
];

function shuffleArr(a){
  var b=a.slice();
  for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t}
  return b;
}

var shuffledQS=shuffleArr(QS);
var cur=0,score=0,answered=false;
var catScores={};
CATS.forEach(function(c){catScores[c.id]={ok:0,tot:0}});
QS.forEach(function(q){catScores[q.cat].tot++});

function getCat(id){return CATS.find(function(c){return c.id===id})}
function setProgress(n,total){document.getElementById('prog-fill').style.width=(n/total*100)+'%'}

var currentCorrectIdx=0;

function showQ(){
  var q=shuffledQS[cur];
  var cat=getCat(q.cat);

  var badge=document.getElementById('cat-badge');
  badge.textContent=cat.name;
  badge.style.background=cat.bg;
  badge.style.color=cat.color;

  document.getElementById('counter').textContent='Вопрос '+(cur+1)+' из '+shuffledQS.length;
  document.getElementById('qtext').textContent=q.q;

  var expBox=document.getElementById('exp-box');
  expBox.style.display='none';
  expBox.textContent=q.exp;

  var nextBtn=document.getElementById('next-btn');
  nextBtn.style.display='none';
  nextBtn.textContent=(cur===shuffledQS.length-1)?'Посмотреть результаты →':'Следующий вопрос →';

  var opts4=[q.correct].concat(q.wrong);
  var shuffledOpts=shuffleArr(opts4);
  currentCorrectIdx=shuffledOpts.indexOf(q.correct);

  var optsDiv=document.getElementById('options');
  optsDiv.innerHTML='';
  shuffledOpts.forEach(function(txt,i){
    var btn=document.createElement('button');
    btn.className='opt';
    btn.textContent=txt;
    btn.dataset.idx=i;
    optsDiv.appendChild(btn);
  });

  answered=false;
}

document.getElementById('options').addEventListener('click',function(e){
  var btn=e.target.closest('.opt');
  if(!btn||answered)return;
  answered=true;
  var chosen=parseInt(btn.dataset.idx);
  var correct=currentCorrectIdx;
  var q=shuffledQS[cur];

  var allBtns=document.querySelectorAll('.opt');
  allBtns.forEach(function(b){b.disabled=true});
  allBtns[correct].classList.add('correct');
  if(chosen!==correct){allBtns[chosen].classList.add('wrong')}
  if(chosen===correct){score++;catScores[q.cat].ok++}

  document.getElementById('exp-box').style.display='block';
  document.getElementById('next-btn').style.display='inline-block';
});

document.getElementById('next-btn').addEventListener('click',function(){
  cur++;
  if(cur>=shuffledQS.length){showResults();return}
  setProgress(cur,shuffledQS.length);
  showQ();
});

document.getElementById('restart-btn').addEventListener('click',function(){
  cur=0;score=0;answered=false;
  CATS.forEach(function(c){catScores[c.id]={ok:0,tot:catScores[c.id].tot}});
  shuffledQS=shuffleArr(QS);
  document.getElementById('result-box').style.display='none';
  document.getElementById('quiz-area').style.display='block';
  setProgress(0,shuffledQS.length);
  showQ();
});

function showResults(){
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('result-box').style.display='block';
  setProgress(shuffledQS.length,shuffledQS.length);
  var total=shuffledQS.length;
  var pct=Math.round(score/total*100);
  var grades=[
    {min:90,txt:'Отлично — профессиональный уровень',col:'#2d7a2d'},
    {min:75,txt:'Хорошо — крепкая база',col:'#BA7517'},
    {min:60,txt:'Удовлетворительно — есть зоны для работы',col:'#534AB7'},
    {min:0,txt:'Нужно повторить — анатомия требует практики',col:'#993C1D'}
  ];
  var g=grades.find(function(x){return pct>=x.min});
  var sub=document.getElementById('res-sub');
  sub.textContent=g.txt;
  sub.style.color=g.col;
  document.getElementById('sc-ok').textContent=score;
  document.getElementById('sc-err').textContent=total-score;
  document.getElementById('sc-pct').textContent=pct+'%';
  var cr=document.getElementById('cat-results');
  cr.innerHTML='';
  CATS.forEach(function(cat){
    var s=catScores[cat.id];
    if(!s||s.tot===0)return;
    var p=Math.round(s.ok/s.tot*100);
    var row=document.createElement('div');
    row.className='cat-row';
    row.innerHTML='<span class="cr-name">'+cat.name+'</span>'
      +'<div class="cr-bar-bg"><div class="cr-bar" style="width:'+p+'%;background:'+cat.color+'"></div></div>'
      +'<span class="cr-val">'+s.ok+'/'+s.tot+'</span>';
    cr.appendChild(row);
  });
}

showQ();
